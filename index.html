<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recipe Data Foundation Hero</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<!-- ==================================================================
     Recipe Data Foundation hero (meez Intelligence v2)
     Paste this whole block into a Webflow Embed element.
     Fluid: fills 100% of its container's width, no side padding,
     no fixed max-width — sizes itself correctly inside a grid
     column and reflows when the grid stacks on tablet.
     ================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  .rdf-hero, .rdf-hero * { box-sizing: border-box; }
  .rdf-hero {
    width: 100%;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .rdf-hero a { color: #a78be0; }
  .rdf-hero a:hover { color: #c4b0ee; }
  .rdf-hero__outer {
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
  }
  .rdf-hero__root {
    width: 1200px;
    height: 720px;
    position: relative;
    transform-origin: top left;
    flex-shrink: 0;
    font-family: 'Inter', system-ui, sans-serif;
  }

  @keyframes rdfh-travel {
    0% { offset-distance: 0%; opacity: 0; }
    12% { opacity: 1; }
    85% { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  @keyframes rdfh-dashMarch { to { stroke-dashoffset: -21; } }
  @keyframes rdfh-fieldGlow {
    0%, 55%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); border-color: rgba(255,255,255,0.10); }
    12%, 38% { box-shadow: 0 0 18px -2px var(--glow, rgba(255,255,255,0.3)); border-color: var(--bc, rgba(255,255,255,0.5)); }
  }
  @keyframes rdfh-cardPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    50% { box-shadow: 0 0 30px -4px var(--glow, rgba(255,255,255,0.2)); }
  }
  @keyframes rdfh-dotPulse {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.35); opacity: 1; }
  }
  @keyframes rdfh-hubBreathe {
    0%, 100% { box-shadow: 0 0 55px rgba(124,92,255,0.28), 0 0 120px rgba(124,92,255,0.14), inset 0 0 60px rgba(124,92,255,0.10); }
    50% { box-shadow: 0 0 90px rgba(124,92,255,0.48), 0 0 160px rgba(124,92,255,0.24), inset 0 0 78px rgba(124,92,255,0.18); }
  }
  @keyframes rdfh-spinSlow { to { transform: rotate(360deg); } }
  @keyframes rdfh-spinRev { to { transform: rotate(-360deg); } }
  @keyframes rdfh-barSway { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.08); } }
  @keyframes rdfh-plateDrift { 0%, 100% { transform: scale(1.14) rotate(0deg); } 50% { transform: scale(1.2) rotate(3deg); } }
</style>

        <circle cx="780" cy="269" r="6.5" fill="#3ba99c" style="transform-box:fill-box;transform-origin:center;animation:rdfh-dotPulse 3s ease-in-out 1.8s infinite"></circle>
        <circle cx="738" cy="394" r="6.5" fill="#38bdf8" style="transform-box:fill-box;transform-origin:center;animation:rdfh-dotPulse 3s ease-in-out 2.1s infinite"></circle>
        <circle cx="682" cy="438" r="6.5" fill="#f5a623" style="transform-box:fill-box;transform-origin:center;animation:rdfh-dotPulse 3s ease-in-out 2.4s infinite"></circle>

        <circle cx="392" cy="376" r="5.5" fill="#a78be0" style="transform-box:fill-box;transform-origin:center;animation:rdfh-dotPulse 3s ease-in-out 0.5s infinite"></circle>

<script>
(function () {
  function init(el) {
    var outer = el.querySelector('.rdf-hero__outer');
    var root = el.querySelector('.rdf-hero__root');
    if (!outer || !root) return;
    function fit() {
      var w = outer.clientWidth;
      var scale = Math.min(1, w / 1200);
      outer.style.height = Math.round(720 * scale) + 'px';
      root.style.transform = 'scale(' + scale + ')';
    }
    fit();
    if (window.ResizeObserver) {
      new ResizeObserver(fit).observe(outer);
    } else {
      window.addEventListener('resize', fit);
    }
  }
  document.querySelectorAll('.rdf-hero').forEach(init);
})();
</script>
